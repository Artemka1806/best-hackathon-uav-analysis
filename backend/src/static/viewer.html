<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UAV Flight Viewer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: sans-serif; background: #1a1a2e; color: #eee; }
    #cesiumContainer { width: 100%; height: calc(100% - 110px); }
    #controls {
      height: 110px;
      padding: 12px 16px;
      background: #16213e;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #top-row { display: flex; align-items: center; gap: 12px; }
    #top-row label { font-size: 14px; }
    #fileInput { flex: 1; font-size: 13px; color: #ccc; }
    #uploadBtn {
      padding: 6px 18px;
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    #uploadBtn:hover { background: #1a5276; }
    #uploadBtn:disabled { background: #555; cursor: default; }
    #status { font-size: 12px; color: #aaa; }
    #slider-row { display: flex; align-items: center; gap: 10px; }
    #slider-row label { font-size: 13px; white-space: nowrap; }
    #timeSlider { flex: 1; }
    #timeLabel { font-size: 12px; color: #ccc; min-width: 80px; text-align: right; }
  </style>
</head>
<body>

<div id="cesiumContainer"></div>

<div id="controls">
  <div id="top-row">
    <label>Flight Log (.BIN):</label>
    <input type="file" id="fileInput" accept=".bin,.BIN" />
    <button id="uploadBtn">Upload &amp; Visualize</button>
    <span id="status">Select a .BIN file to begin.</span>
  </div>
  <div id="slider-row">
    <label>Time:</label>
    <input type="range" id="timeSlider" min="0" max="0" value="0" disabled />
    <span id="timeLabel">–</span>
  </div>
</div>

<script>
  // Disable all Cesium ion requests — no token needed
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.AAAA';

  const osmProvider = new Cesium.UrlTemplateImageryProvider({
    url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    maximumLevel: 19,
    credit: new Cesium.Credit('© OpenStreetMap contributors'),
  });

  const viewer = new Cesium.Viewer('cesiumContainer', {
    imageryProvider: false,
    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    animation: false,
    timeline: false,
    fullscreenButton: false,
    creditContainer: document.createElement('div'),
  });

  viewer.imageryLayers.removeAll();
  viewer.imageryLayers.addImageryProvider(osmProvider);

  let points = [];
  let origin = null;
  let baseAlt = 0;
  let pathEntity = null;
  let remainingEntity = null;
  let uavEntity = null;

  const slider = document.getElementById('timeSlider');
  const timeLabel = document.getElementById('timeLabel');
  const status = document.getElementById('status');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileInput = document.getElementById('fileInput');

  function clearScene() {
    viewer.entities.removeAll();
    pathEntity = null;
    remainingEntity = null;
    uavEntity = null;
    points = [];
    origin = null;
    baseAlt = 0;
    slider.max = 0;
    slider.value = 0;
    slider.disabled = true;
    timeLabel.textContent = '–';
  }

  function buildEntities() {
    baseAlt = origin ? origin.alt : points[0].alt;
    const allPos = points.map(p => Cesium.Cartesian3.fromDegrees(p.lon, p.lat, baseAlt + p.u));

    // Full trajectory — red bold (static, positions computed once from current points)
    pathEntity = viewer.entities.add({
      polyline: {
        positions: allPos,
        width: 6,
        material: Cesium.Color.RED,
        clampToGround: false,
      },
    });

    // UAV marker — driven by CallbackProperty (no flicker)
    uavEntity = viewer.entities.add({
      position: new Cesium.CallbackProperty(() => {
        const p = points[parseInt(slider.value, 10)];
        return Cesium.Cartesian3.fromDegrees(p.lon, p.lat, baseAlt + p.u);
      }, false),
      orientation: new Cesium.CallbackProperty(() => {
        const p = points[parseInt(slider.value, 10)];
        const pos = Cesium.Cartesian3.fromDegrees(p.lon, p.lat, baseAlt + p.u);
        const hpr = new Cesium.HeadingPitchRoll(
          Cesium.Math.toRadians(p.yaw   ?? 0),
          Cesium.Math.toRadians(p.pitch ?? 0),
          Cesium.Math.toRadians(p.roll  ?? 0)
        );
        return Cesium.Transforms.headingPitchRollQuaternion(pos, hpr);
      }, false),
      ellipsoid: {
        radii: new Cesium.Cartesian3(300, 100, 100),
        material: Cesium.Color.ORANGE.withAlpha(0.95),
        outline: false,
      },
    });
  }

  slider.addEventListener('input', () => {
    if (points.length === 0) return;
    const p = points[parseInt(slider.value, 10)];
    const tSec = (p.t / 1e6).toFixed(1);
    timeLabel.textContent = `${tSec}s  alt:${p.alt.toFixed(1)}m`;
  });

  uploadBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) { status.textContent = 'Please select a .BIN file.'; return; }

    clearScene();
    console.log('clearScene done, points:', points.length);
    uploadBtn.disabled = true;
    status.textContent = 'Uploading…';

    const form = new FormData();
    form.append('file', file);

    origin = null;
    let count = 0;

    try {
      const resp = await fetch('/api/upload/enu-stream', { method: 'POST', body: form });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        status.textContent = `Error: ${err.detail || resp.statusText}`;
        uploadBtn.disabled = false;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line
        for (const line of lines) {
          if (!line.trim()) continue;
          const obj = JSON.parse(line);
          if (obj.type === 'origin') {
            origin = obj;
          } else {
            points.push(obj);
            count++;
            if (count % 100 === 0) {
              status.textContent = `Loading… ${count} points`;
            }
          }
        }
      }

      if (buffer.trim()) {
        const obj = JSON.parse(buffer);
        if (obj.type !== 'origin') points.push(obj);
      }

    } catch (e) {
      status.textContent = `Network error: ${e.message}`;
      uploadBtn.disabled = false;
      return;
    }

    console.log('stream done, points:', points.length, 'origin:', origin);

    if (points.length === 0) {
      status.textContent = 'No GPS points found in log.';
      uploadBtn.disabled = false;
      return;
    }

    buildEntities();
    console.log('buildEntities done');
    viewer.scene.requestRender();

    slider.max = points.length - 1;
    slider.value = 0;
    slider.disabled = false;

    const p0 = points[0];
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(p0.lon, p0.lat, p0.alt + 300),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 },
      duration: 2,
    });

    status.textContent = `Loaded ${points.length} GPS points.`;
    uploadBtn.disabled = false;
  });
</script>
</body>
</html>
