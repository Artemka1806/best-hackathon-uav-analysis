services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_API_WS_URL: ${VITE_API_WS_URL:-ws://localhost:8000}
        VITE_CESIUM_TOKEN: ${VITE_CESIUM_TOKEN:-}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
